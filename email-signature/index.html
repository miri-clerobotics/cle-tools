      // 주소 볼드 처리된 상세 정보 맵
      const locationDetails = {

          f: "2.2284.0135",

          mapUrl: "https://maps.app.goo.gl/sxscgrSPKt3NAc3p9"
        },
        lab: {
          t: "31.427.0314",
          f: "31.427.0315",
          aKo: "<strong>시스템연구소 (데모/전시)</strong> 15847 경기 군포시 공단로 117, 1층",
          aEn: "<strong>System R&D Center (Demo/Exhibition)</strong> 1F, 117, Gongdan-ro, Gunpo-si, Gyeonggi-do, Republic of Korea",
          mapUrl: "https://maps.app.goo.gl/XCz3NN1Hi7jwPjAMA"
        }
      };

      const activeLocation = locationDetails[locationType];

      // 이름 렌더링 블록 (가로 중앙정렬 유지)
      const renderNameRow = () => {
        if (sigLang === "ko") {
          return `

      // 파트명 렌더링 블록

                <td style="font-family:'Microsoft Sans Serif',sans-serif; font-size:12px; color:#cccccc; padding:0 10px; vertical-align: middle; line-height: 1;">|</td>
                <td style="font-family:'Noto Sans KR','Noto Sans',sans-serif; font-size:12px; color:#000000; white-space:nowrap; vertical-align: middle; line-height: 1;">${titleEn}</td>
              </tr>
            </table>
          `;
        }
        return `
          <table cellpadding="0" cellspacing="0" border="0" style="margin-top:6px; text-align: left;">
            <tr>
              <td style="font-family:'Noto Sans',sans-serif; font-size:12px; color:#000000; white-space:nowrap; vertical-align: middle; line-height: 1;">${titleEn}</td>

        }
        return `<strong>[Confidentiality Notice]</strong> This email, including its contents and any attachments, is intended solely for the designated recipient(s) and may contain confidential or privileged information. Any disclosure, distribution, or reproduction of this email by anyone other than the intended recipient is strictly prohibited. If you have received this email in error, please notify the sender immediately and delete it from your system.`;
      };

      // 서명 HTML 템플릿
      const signatureHTML = `<style>
      @media only screen and (max-width: 520px) {
        .mobile-logo-wrap {
          display: block !important;
          max-width: 100% !important;
          width: 100% !important;
          text-align: left !important;
          direction: ltr !important;
        }
        .mobile-logo-td {
          text-align: left !important;
          padding-bottom: 16px !important;
        }
        .mobile-logo-td img {
          float: none !important;
          margin: 0 !important;
        }
        .mobile-info-wrap {
          display: block !important;
          max-width: 100% !important;
          width: 100% !important;
          text-align: left !important;
          direction: ltr !important;
        }
      }
      </style>
<table id="signature-table-target" 
width="680"
cellpadding="0" 
cellspacing="0" 
border="0" 
style="max-width:680px; width:100%; background:#ffffff;
border:1px solid #cccccc;
border-collapse:collapse;
font-family:'Noto Sans KR','Noto Sans',sans-serif;
text-align: left;">
        <tr>
          <td style="padding:16px; text-align: left;">

            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="text-align: left; border-collapse:collapse;" dir="ltr">
              <tr>
                <td style="padding:0; text-align: left; font-size:0;">
                  
                  <!-- Logo Section (Top Left) -->
                  <div class="mobile-logo-wrap" style="display: block; width: 100%; font-size: 14px; text-align: left; padding-bottom: 24px;">
                    <table cellpadding="0" cellspacing="0" border="0" style="text-align: left; width: 100%;">
                      <tr>
                        <td class="mobile-logo-td" style="vertical-align:top; text-align: left; padding:0;">
                          <!-- currentLogoUrl 변수가 현재 설정된 언어에 맞는 로고를 자동으로 불러옵니다 -->
<img src="${currentLogoUrl}"
width="240"
height="54"
alt="CLE Robotics Logo"
style="display:block;
object-fit:contain;
max-width:240px;
max-height:54px;
border:0;">
                        </td>
                      </tr>
                    </table>
                  </div>

                  <!-- Personal Info Section (Below Logo) -->
                  <div class="mobile-info-wrap" style="display: block; width: 100%; font-size: 14px; text-align: left;">
                    <table cellpadding="0" cellspacing="0" border="0" style="text-align: left; width: 100%;">
                      <tr>
                        <td style="padding:0; text-align: left;">
                          <table cellpadding="0" cellspacing="0" border="0" style="text-align: left;">
                            <tr>
                              ${renderNameRow()}
                            </tr>
                          </table>
                          ${renderDeptRow()}
                          ${renderTitleRow()}
                        </td>
                      </tr>
                    </table>
                  </div>

                </td>
              </tr>
            </table>

            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr><td height="16" style="font-size:0; line-height:0;">&nbsp;</td></tr>
            </table>

            <table cellpadding="0" cellspacing="0" border="0" style="font-size:12px; color:#000000; text-align: left; width: 100%;">
              <tr>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:700; padding-bottom:2px; width:16px; vertical-align:top;">M</td>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:400; padding-bottom:2px; padding-left:4px; vertical-align:top;">+82.${mobile}</td>
              </tr>
              <tr>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:700; padding-bottom:2px; width:16px; vertical-align:top;">E</td>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:400; padding-bottom:2px; padding-left:4px; vertical-align:top;"> ${email}@clerobotics.com</td>
              </tr>
              <tr>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:700; padding-bottom:2px; width:16px; vertical-align:top;">T</td>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:400; padding-bottom:2px; padding-left:4px; vertical-align:top;">+82.${activeLocation.t}</td>
              </tr>
              <tr>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:700; padding-bottom:2px; width:16px; vertical-align:top;">F</td>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:400; padding-bottom:2px; padding-left:4px; vertical-align:top;">+82.${activeLocation.f}</td>
              </tr>
              <tr>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:700; padding-bottom:2px; width:16px; vertical-align:top;">H</td>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:400; padding-bottom:2px; padding-left:4px; vertical-align:top;">  www.clerobotics.com</td>
              </tr>
              <tr>
                <td style="font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:700; width:16px; vertical-align:top; line-height:1.6;">A</td>
             <td style="font-family:'Noto Sans KR','Noto Sans',sans-serif; font-size:12px; font-weight:400; padding-left:4px; line-height:1.6; vertical-align:top;">
  ${sigLang === "ko" ? `${activeLocation.aKo}<br>${activeLocation.aEn}` : activeLocation.aEn}
</td>
              </tr>
            </table>

            <!-- Divider Line Area: 모바일 이메일 클라이언트의 완벽한 렌더링 호환성을 위해 border 인라인 스타일로 교정 -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%; text-align: left;">
              <tr>
                <td style="padding: 16px 0; text-align: left; width: 100%;">
                  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%; border-top: 1px solid #cccccc;">
                    <tr><td style="font-size:0; line-height:0; height:1px;">&nbsp;</td></tr>
                  </table>
                </td>
              </tr>
            </table>

            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="text-align: left;">
              <tr>
                <td style="font-family:'Noto Sans KR','Noto Sans',sans-serif; font-size:12px; color:#707070; line-height:1.6; text-align: left; padding-bottom: 6px;">
                  ${renderDisclaimer()}
                </td>
              </tr>
            </table>

          </td>
        </tr>
      </table>`;

      const handleCopySignature = () => {
        const tableEl = document.getElementById("signature-table-target");
        if (!tableEl) {
          fallbackCopy();
          return;
        }

        try {
          const range = document.createRange();
          range.selectNode(tableEl);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);

          const successful = document.execCommand("copy");
          if (successful) {
            setCopiedSign(true);
            setTimeout(() => setCopiedSign(false), 2000);
          } else {
            fallbackCopy();
          }
          selection.removeAllRanges(); 
        } catch (err) {
          console.warn("기본 복사 시스템 제한으로 일반 우회 복사 모드를 가동합니다.", err);
          fallbackCopy();
        }
      };

      const fallbackCopy = () => {
        navigator.clipboard.writeText(signatureHTML).then(() => {
          setCopiedSign(true);
          setTimeout(() => setCopiedSign(false), 2000);
        });
      };

      return (
        <div className="h-screen flex bg-[#F8F9FB] text-slate-800 overflow-hidden font-sans">
          
          {/* [좌측 고정 메뉴] 입력용 제어판 */}
          <aside className="w-[380px] bg-white border-r border-slate-200/80 p-5 flex flex-col gap-6 overflow-y-auto h-full shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.01)] z-10">
            <div>
              <div className="flex items-center gap-3">
             <div class="h-10 w-10 rounded-xl overflow-hidden border border-slate-200 bg-white shadow-[0_1px_2px_rgba(0,0,0,0.03)] flex items-center justify-center shrink-0">
  <img
    src="/favicon.ico"
    alt="Logo"
    className="w-full h-full object-cover"
  />
</div>

                  <p className="text-[10px] text-slate-400 font-medium">클레로보틱스 메일 서명</p>
                </div>
              </div>
            </div>

            <div className="space-y-4.5 flex-1">

                <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                  <button onClick={() => setSigLang("ko")} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${sigLang === "ko" ? "bg-white text-slate-800 shadow-sm border border-slate-200/50" : "text-slate-500 hover:text-slate-700"}`}>
                    한국어
                  </button>
                  <button onClick={() => setSigLang("en")} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${sigLang === "en" ? "bg-white text-slate-800 shadow-sm border border-slate-200/50" : "text-slate-500 hover:text-slate-700"}`}>
                    영어
                  </button>
                </div>
              </div>

              {/* 근무지 선택 */}
              <div className="space-y-2 mt-4">
                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">근무지 선택</label>
                <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                  <button onClick={() => handleLocationChange("hq")} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${locationType === "hq" ? "bg-white text-slate-800 shadow-sm border border-slate-200/50" : "text-slate-500 hover:text-slate-700"}`}>
                    본사 (기술연구소)
                  </button>
                  <button onClick={() => handleLocationChange("lab")} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${locationType === "lab" ? "bg-white text-slate-800 shadow-sm border border-slate-200/50" : "text-slate-500 hover:text-slate-700"}`}>
                    시스템연구소
                  </button>
                </div>
              </div>

              <div className="border-t border-slate-100 pt-3.5 mt-2">

                {/* 이름 그룹 */}

                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" value={nameKo} onChange={(e) => setNameKo(e.target.value)} placeholder="한글 이름" className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-[#FF4747] font-semibold transition-all" />

  type="text"

  onChange={(e) => setNameEn(e.target.value.toUpperCase())}
  placeholder="영문 이름"
  className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-[#FF4747] font-semibold transition-all"
/>
                  </div>
                </div>

                {/* 소속 파트 그룹 */}
                <div className="space-y-2 mb-4 mt-4">
                  <div className="flex justify-between items-end">
                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">파트명</label>
                    <select 
                      onChange={(e) => {
                        const preset = deptPresets.find(p => p.label === e.target.value);
                        if(preset) {
                          setDeptKo(preset.ko);
                          setDeptEn(preset.en);
                        }
                      }}
                      className="text-[10px] bg-white border border-slate-200 rounded px-1.5 py-0.5 text-slate-500 cursor-pointer outline-none"
                    >
                      <option value="">프리셋 선택</option>
                      {deptPresets.map(p => <option key={p.label} value={p.label}>{p.label}</option>)}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" value={deptKo} onChange={(e) => setDeptKo(e.target.value)} placeholder="국문 소속 파트 (직접입력 가능)" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-[#FF4747] font-semibold transition-all" />
                    <input type="text" value={deptEn} onChange={(e) => setDeptEn(e.target.value)} placeholder="영문 소속 파트 (직접입력 가능)" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-[#FF4747] font-semibold transition-all" />
                  </div>
                </div>

                {/* 직급 그룹 */}
                <div className="space-y-2 mb-4 mt-4">
                  <div className="flex justify-between items-end">
                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">직급명</label>
                    <select 
                      onChange={(e) => {
                        const preset = titlePresets.find(p => p.label === e.target.value);
                        if(preset) {
                          setTitleKo(preset.ko);
                          setTitleEn(preset.en);
                        }
                      }}
                      className="text-[10px] bg-white border border-slate-200 rounded px-1.5 py-0.5 text-slate-500 cursor-pointer outline-none"
                    >
                      <option value="">프리셋 선택</option>
                      {titlePresets.map(p => <option key={p.label} value={p.label}>{p.label}</option>)}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" value={titleKo} onChange={(e) => setTitleKo(e.target.value)} placeholder="국문 직급" className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-[#FF4747] font-semibold transition-all" />
                    <input type="text" value={titleEn} onChange={(e) => setTitleEn(e.target.value)} placeholder="영문 직급" className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-[#FF4747] font-semibold transition-all" />
                  </div>
                </div>

                {/* 휴대폰 번호 */}
                <div className="space-y-2 mb-4 mt-4">
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">휴대폰 번호</label>
                  <div className="relative flex items-center">
                    <span className="absolute left-3 text-xs font-bold text-slate-400 select-none pointer-events-none">+82.</span>
                    <input type="text" value={mobile} onChange={(e) => setMobile(e.target.value)} placeholder="10.4617.3827" className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-3 py-2 text-xs focus:outline-none focus:border-[#FF4747] font-semibold transition-all" />
                  </div>
                </div>

                {/* 이메일 주소 */}
                <div className="space-y-2 mb-4 mt-4">
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">이메일 주소</label>
                  <div className="relative flex items-center">
                    <input type="text" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="miri" className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-3 pr-28 py-2 text-xs focus:outline-none focus:border-[#FF4747] font-semibold text-right transition-all" />
                    <span className="absolute right-3 text-[11px] font-bold text-slate-400 select-none pointer-events-none">@clerobotics.com</span>
                  </div>
                </div>
              </div>

              {/* 고급 옵션: 한/영 로고 각각 설정 가능하도록 분리 */}
              <div className="space-y-2 border-t border-slate-100 pt-3.5">
                <button onClick={() => {
                  const el = document.getElementById("advancedConfig");
                  if (el) el.classList.toggle("hidden");
                }} className="text-[10px] font-extrabold text-slate-400 hover:text-slate-600 uppercase tracking-wider flex items-center gap-1">
                  <span>고급 설정 (로고 이미지 URL)</span>
                  <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" />
                  </svg>
                </button>
                <div id="advancedConfig" className="hidden space-y-2.5 bg-slate-50 p-3 rounded-xl border border-slate-200/50 mt-1">
                  <div className="space-y-1 mb-2">
                    <label className="text-[9px] font-bold text-slate-400 uppercase block">국문 로고 이미지 주소</label>
                    <input type="text" value={logoUrlKo} onChange={(e) => setLogoUrlKo(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg px-2.5 py-1 text-xs focus:outline-none font-semibold text-slate-700" />
                  </div>
                  <div className="space-y-1">
                    <label className="text-[9px] font-bold text-slate-400 uppercase block">영문 로고 이미지 주소</label>
                    <input type="text" value={logoUrlEn} onChange={(e) => setLogoUrlEn(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg px-2.5 py-1 text-xs focus:outline-none font-semibold text-slate-700" />
                  </div>
                </div>
              </div>
            </div>
          </aside>

          {/* [우측 캔버스 영역] 미리보기 및 복사 조작 스크린 */}
          <main className="flex-1 flex flex-col overflow-hidden p-8">
            <div className="max-w-5xl w-full mx-auto flex flex-col flex-1 gap-4 overflow-hidden">
              
              {/* 상단 바 */}
              <div className="flex items-center justify-between border-b border-slate-200/80 pb-2 shrink-0">
                <div className="flex items-center gap-1.5 py-1.5">
                  <span className="text-xs font-extrabold text-slate-500">이메일 서명 미리보기</span>
                </div>

                <div>
                  <button onClick={handleCopySignature} className={`px-5 py-2 rounded-xl text-xs font-bold transition-all shadow-md ${copiedSign ? "bg-emerald-500 text-white shadow-emerald-100" : "bg-[#FF4747] hover:bg-[#FF4747]/90 text-white shadow-[#FF4747]/10"}`}>
                    {copiedSign ? "서명 복사 완료 ✓" : "이메일 서명 복사하기"}
                  </button>
                </div>
              </div>

              {/* 메인 미리보기 박스 */}
              <div className="flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm p-6 overflow-auto flex items-start justify-center">
                <div className="border border-slate-100 rounded-2xl p-6 shadow-sm bg-white select-text overflow-x-auto flex justify-start">
  <div
    style={{
      width: "680px",
      minWidth: "680px",
      flexShrink: 0
    }}
    dangerouslySetInnerHTML={{ __html: signatureHTML }}
  />
</div>
              </div>

              {/* 하단 팁 */}
              <div className="bg-amber-50/60 border border-amber-100 rounded-xl p-4 text-xs text-slate-600 leading-normal shrink-0 flex gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-amber-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <div>
                  <p className="font-extrabold text-slate-700">이메일 서명 적용 팁</p>
                  <ul className="list-disc pl-4 mt-1 space-y-0.5 text-slate-500 font-medium">
                    <li>상단의 <b>[이메일 서명 복사하기]</b>를 클릭하여 디자인과 링크가 보존된 서명을 복사하세요.</li>
                    <li>구글 맵 링크가 정상적으로 작동하도록 최적화되어 있습니다. 메일 설정에 붙여넣기 후 사용하세요.</li>
                  </ul>
                </div>
              </div>

            </div>
          </main>
          
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
