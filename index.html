<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLE Robotics Internal Tools</title>
    <link rel="icon" href="favicon.ico" />
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8f9fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-top: 0; font-size: 24px; color: #1a202c; }
        .logo { max-width: 200px; margin-bottom: 20px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f1f5f9;
            color: #475569;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }
        .btn:hover {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="CLE ROBOTICS logo_Horizontal type.png" alt="CLE Robotics" class="logo">
        <h1>사내 업무 도구 포털</h1>
        <p style="color: #64748b; margin-bottom: 30px; font-size: 14px;">원하시는 도구를 선택하세요.</p>
        
        <!-- 폴더 이름이 곧 URL 경로가 됩니다! -->
        <a href="/email-signature/" class="btn">이메일 서명 생성기</a>
        <a href="/manual-tool/" class="btn">매뉴얼 도구 (Manual Tool)</a>
    </div>
</body>
</html>
